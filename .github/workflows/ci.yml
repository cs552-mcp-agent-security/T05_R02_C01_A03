name: Android CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :app:assembleDebug testDebugUnitTest --no-daemon
